<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVE</title>

<style>
body{
    margin:0;
    background:#0a0a0a;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    text-align:center;
    width:90%;
    max-width:500px;
}

h1{
    font-size:80px;
    color:#ff1f1f;
    margin:0;
}

p{
    color:#aaa;
    margin-bottom:30px;
}

.btn{
    display:block;
    text-decoration:none;
    background:#ff1f1f;
    color:white;
    padding:16px;
    margin:12px 0;
    border-radius:8px;
    font-weight:bold;
}

.btn:hover{
    opacity:.9;
}
</style>
</head>
<script>
function openYouTube() {
    const webUrl = "https://www.youtube.com/@RaveOP8";

    if (/Android/i.test(navigator.userAgent)) {
        window.location.href =
        "intent://www.youtube.com/@RaveOP8#Intent;package=com.google.android.youtube;scheme=https;S.browser_fallback_url=" +
        encodeURIComponent(webUrl) + ";end";
    } else if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        window.location.href = "youtube://www.youtube.com/@RaveOP8";

        setTimeout(() => {
            window.location.href = webUrl;
        }, 1500);
    } else {
        window.location.href = webUrl;
    }
}

function openTwitch() {
    const webUrl = "https://www.twitch.tv/ravexd_";

    if (/Android/i.test(navigator.userAgent)) {
        window.location.href =
        "intent://www.twitch.tv/ravexd_#Intent;package=tv.twitch.android.app;scheme=https;S.browser_fallback_url=" +
        encodeURIComponent(webUrl) + ";end";
    } else if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        window.location.href = "twitch://stream/ravexd_";

        setTimeout(() => {
            window.location.href = webUrl;
        }, 1500);
    } else {
        window.location.href = webUrl;
    }
}
</script>
<body>

<div class="container">
    <h1>RAVE</h1>

    <p>Namaste Dosto, I'm RAVE.<br>
    Welcome to the Rave Army.</p>

    <a class="btn" href="#" onclick="openYouTube()">
    YOUTUBE
</a>

<a class="btn" href="#" onclick="openTwitch()">
    TWITCH
</a>

</div>

</body>
</html>

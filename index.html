<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RAVE</title>

<style>
    @font-face {
    font-family: "ObelixPro";
    src: url("./fonts/ObelixPro.ttf") format("truetype");
    font-weight: normal;
    font-style: normal;
}
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    overflow:hidden;

    background:url('./img/banner.jpg') center center/cover no-repeat;
}
body::before{
    content:"";
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.15);

    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(4px);

    z-index:0;
}
.container{
    position:relative;
    z-index:10;

     width:min(92%,500px);
    margin:20px;
    padding:30px 24px;

    text-align:center;

    background:rgba(15, 0, 0, 0.059);
    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,0.1);

    border-radius:30px;

    padding:40px;

    box-shadow:
    0 8px 32px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.1);
}

h1{
    font-family:"ObelixPro", sans-serif;
    font-size:clamp(48px, 12vw, 72px);
    line-height:1;
    color:#1aff01;
    margin:0;
    font-family: "ObelixPro", sans-serif;
    font-size: 72px;
    margin: 0;
}

p{
    color:#ffffff;
    font-family: "ObelixPro", sans-serif;
    margin-bottom:30px;
}

.btn{
    display:block;
    text-decoration:none;
    font-family: "ObelixPro", sans-serif;

    margin:14px 0;
    padding:16px;

    color:#000000;
    font-weight:600;
    letter-spacing:1px;

    background:rgb(255, 255, 255);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    border:3px solid rgba(34, 203, 0, 0.747);
    border-radius:16px;

    transition:.25s ease;

    box-shadow:
        0 0 10px rgba(0,255,120,0.12),
        inset 0 0 10px rgba(0,255,120,0.04);
}

.btn:hover{
    transform:translateY(2px);
    color:#fe0000;
    border-color:#00ff15;

    box-shadow:
        0 0 15px rgba(0,255,120,0.25),
        0 0 30px rgba(0,255,120,0.12);
}
.btn2{
    display:block;
    text-decoration:none;
    font-family: "ObelixPro", sans-serif;

    margin:14px 0;
    padding:16px;

    color:#000000;
    font-weight:600;
    letter-spacing:1px;

    background:rgb(255, 255, 255);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    border:3px solid rgba(34, 203, 0, 0.747);
    border-radius:16px;

    transition:.25s ease;

    box-shadow:
        0 0 10px rgba(0,255,120,0.12),
        inset 0 0 10px rgba(0,255,120,0.04);
}
.btn2:hover{
    transform:translateY(2px);
    color:#b200fe;
    border-color:#00ff15;

    box-shadow:
        0 0 15px rgba(0,255,120,0.25),
        0 0 30px rgba(0,255,120,0.12);
}
.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:0 auto 20px auto;
    border:3px solid #4cff1f;
    box-shadow:0 0 25px rgba(31, 255, 50, 0.35);
}

</style>
</head>
<script>
function openYouTube() {
    const webUrl = "https://www.youtube.com/@RaveOP8";

    if (/Android/i.test(navigator.userAgent)) {
        window.location.href =
        "intent://www.youtube.com/@RaveOP8#Intent;package=com.google.android.youtube;scheme=https;S.browser_fallback_url=" +
        encodeURIComponent(webUrl) + ";end";
    } else if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        window.location.href = "youtube://www.youtube.com/@RaveOP8";

        setTimeout(() => {
            window.location.href = webUrl;
        }, 1500);
    } else {
        window.location.href = webUrl;
    }
}

function openTwitch() {
    const webUrl = "https://www.twitch.tv/ravexd_";

    if (/Android/i.test(navigator.userAgent)) {
        window.location.href =
        "intent://www.twitch.tv/ravexd_#Intent;package=tv.twitch.android.app;scheme=https;S.browser_fallback_url=" +
        encodeURIComponent(webUrl) + ";end";
    } else if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        window.location.href = "twitch://stream/ravexd_";

        setTimeout(() => {
            window.location.href = webUrl;
        }, 1500);
    } else {
        window.location.href = webUrl;
    }
}
</script>
<body>

<div class="container">
<img
  src="https://yt3.googleusercontent.com/T3yTtM1v1mmNcLsegmQJ9nQs0Gkw4e_aanEd1EFTuuP9PfiH9SlRvOOM4dbrB1llWN4En44Yrg=s160-c-k-c0x00ffffff-no-rj"
  alt="RAVE Profile"
  class="avatar">
    <h1>RAVE</h1>

    <p>Gamer & Streamer</p>

    <a class="btn" href="./youtube.html">
    YOUTUBE - RaveOP
</a>

<a class="btn2" href="./twitch.html">
    TWITCH
</a>
 <a class="btn" href="./yt2.html">
    YOUTUBE - RaveCS
</a>

</div>

</body>
</html>
